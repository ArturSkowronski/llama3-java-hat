name: Babylon Bug Reproducer — F16.f16ToFloat() OpenCL Codegen

# This workflow reproduces a Babylon HAT codegen bug:
# F16.f16ToFloat() generates broken OpenCL C when called on an F16Array element.
# See: docs/babylon-bug-report-f16ToFloat.md
#
# Expected: FAILS until fixed in Babylon upstream (openjdk/babylon code-reflection branch).
# testF16ToFloatDirectOnArrayElement  → FAILS with codegen errors (the bug)
# testF16ToFloatViaLocalVariable      → SKIPPED on PoCL (no cl_khr_fp16); PASSES on GPU
# Once the codegen bug is fixed AND a GPU with cl_khr_fp16 is available, this turns green.
#
# Run manually: Actions → "Babylon Bug Reproducer" → Run workflow

on:
  workflow_dispatch:
    inputs:
      babylon-repo:
        description: 'Babylon repository (owner/repo)'
        required: false
        default: 'openjdk/babylon'
        type: string
      babylon-branch:
        description: 'Babylon branch to test'
        required: false
        default: 'code-reflection'
        type: string
  push:
    paths:
      - 'src/test/java/**/F16ToFloatOpenCLCodegenTest.java'
      - 'docs/babylon-bug-report-f16ToFloat.md'
      - '.github/workflows/babylon-bug-reproducer.yml'

jobs:
  build-babylon:
    runs-on: ubuntu-latest
    outputs:
      babylon-home: ${{ steps.set-path.outputs.babylon-home }}
    steps:
      - name: Checkout Babylon
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.babylon-repo || 'openjdk/babylon' }}
          path: babylon
          ref: ${{ inputs.babylon-branch || 'code-reflection' }}

      - name: Cache Babylon JDK and HAT
        id: cache-babylon
        uses: actions/cache@v4
        with:
          path: |
            babylon/build
            babylon/hat/build
          # Separate key from ci.yml: HAT must be built WITH OpenCL dev headers
          # so the native opencl_backend.so is compiled with full OpenCL support.
          key: ${{ runner.os }}-babylon-hat-opencl-${{ hashFiles('babylon/.git/HEAD') }}
          restore-keys: |
            ${{ runner.os }}-babylon-hat-opencl-

      - name: Install Build Dependencies
        if: steps.cache-babylon.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libx11-dev libxext-dev libxrender-dev \
            libxrandr-dev libxtst-dev libxt-dev libcups2-dev libasound2-dev \
            libfontconfig1-dev autoconf ocl-icd-opencl-dev

      - name: Setup Boot JDK
        if: steps.cache-babylon.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Configure and Build Babylon JDK
        if: steps.cache-babylon.outputs.cache-hit != 'true'
        id: build-jdk
        continue-on-error: true
        run: |
          cd babylon
          bash configure \
            --with-conf-name=linux-x86_64-server-release \
            --with-debug-level=release \
            --with-native-debug-symbols=none \
            --disable-warnings-as-errors
          make images JOBS=$(nproc) CONF=linux-x86_64-server-release

      - name: Retry Build if failed
        if: steps.cache-babylon.outputs.cache-hit != 'true' && steps.build-jdk.outcome == 'failure'
        run: |
          cd babylon
          make reconfigure JOBS=$(nproc) CONF=linux-x86_64-server-release
          make images JOBS=$(nproc) CONF=linux-x86_64-server-release

      - name: Build HAT
        if: steps.cache-babylon.outputs.cache-hit != 'true'
        run: |
          cd babylon/hat
          export JAVA_HOME=$(pwd)/../build/linux-x86_64-server-release/images/jdk
          export PATH=$JAVA_HOME/bin:$PATH
          bash hat/bootstrap.bash
          java -cp hat/job.jar --enable-preview --source 26 hat.java bld

      - name: Set Babylon Home Output
        id: set-path
        run: echo "babylon-home=$(pwd)/babylon/build/linux-x86_64-server-release/images/jdk" >> $GITHUB_OUTPUT

      - name: Upload Babylon Artifact
        uses: actions/upload-artifact@v4
        with:
          name: babylon-jdk
          path: |
            babylon/build/linux-x86_64-server-release/images/jdk
            babylon/hat/build
          include-hidden-files: true
          retention-days: 7

  reproduce-bug:
    needs: build-babylon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Download Babylon Artifact
        uses: actions/download-artifact@v4
        with:
          name: babylon-jdk
          path: babylon-jdk

      - name: Install OpenCL CPU Runtime (Intel oneAPI + PoCL fallback)
        run: |
          # Intel oneAPI CPU runtime — supports cl_khr_fp16 (experimental) on x86 CPU
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-runtime-opencl ocl-icd-libopencl1 clinfo
          # Do NOT install PoCL — it lacks cl_khr_fp16 and would be picked over Intel runtime
          echo "--- OpenCL devices ---"
          clinfo --list || true
          echo "--- cl_khr_fp16 support ---"
          clinfo 2>/dev/null | grep -i fp16 || echo "cl_khr_fp16 not found in clinfo"

      - name: Setup Environment
        run: |
          JDK_PATH=babylon-jdk/build/linux-x86_64-server-release/images/jdk
          chmod -R +x $JDK_PATH/bin/
          find $JDK_PATH/lib -type f -name "jspawnhelper" -exec chmod +x {} \;
          find $JDK_PATH/lib -type f -name "*.so" -exec chmod +x {} \;
          find babylon-jdk/hat/build -type f -name "*.so" -exec chmod +x {} \; 2>/dev/null || true
          echo "JAVA_BABYLON_ROOT=$(pwd)/babylon-jdk" >> $GITHUB_ENV
          # LD_LIBRARY_PATH so the dynamic linker finds libshared_backend.so and libOpenCL
          # when the JVM loads libopencl_backend.so (java.library.path only helps for the
          # top-level loadLibrary call, not for transitive .so dependencies).
          echo "LD_LIBRARY_PATH=$(pwd)/babylon-jdk/hat/build:/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          chmod +x gradlew

      - name: Build Project
        run: |
          export JAVA_HOME=$JAVA_BABYLON_ROOT/build/linux-x86_64-server-release/images/jdk
          export PATH=$JAVA_HOME/bin:$PATH
          ./gradlew build

      - name: Diagnose HAT native library
        run: |
          echo "=== Artifact root ==="
          ls -la babylon-jdk/
          echo "=== java.library.path will be ==="
          echo "JAVA_BABYLON_ROOT=$JAVA_BABYLON_ROOT"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo "hat/build path: $JAVA_BABYLON_ROOT/hat/build"
          ls -la $JAVA_BABYLON_ROOT/hat/build/*.so 2>/dev/null || echo "(no .so files found)"
          echo "=== ldd on opencl_backend.so ==="
          SO=$(find babylon-jdk -name "*opencl_backend*.so" 2>/dev/null | head -1)
          if [ -n "$SO" ]; then
            echo "Found: $SO"
            ldd "$SO" || echo "(ldd failed)"
          else
            echo "opencl_backend.so NOT FOUND"
          fi

      - name: Run Bug Reproducer
        run: |
          export JAVA_HOME=$JAVA_BABYLON_ROOT/build/linux-x86_64-server-release/images/jdk
          export PATH=$JAVA_HOME/bin:$PATH
          # Enable Intel CPU experimental FP16 support
          export CL_CONFIG_CPU_EXPERIMENTAL_FP16=1
          echo "=== Running F16.f16ToFloat() OpenCL codegen bug reproducer ==="
          echo "=== Expected: FAILS until fixed in Babylon upstream           ==="
          ./gradlew babylonBugReproducer
